<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box} body{margin:0;font-family:'Noto Serif TC',serif;color:#333;overflow-x:hidden} .en{font-family:'Playfair Display',serif}
section{width:100%}
.hero{height:100vh;position:relative;width:min(72vh,100%);margin:0 auto;background:url('photo5.jpg') center/cover no-repeat}
.hero:after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.35)}
.hero-text{position:absolute;z-index:2;left:50%;top:78%;transform:translate(-50%,-50%);font-size:42px;letter-spacing:4px;text-align:center;width:90%}
.couple{max-width:1200px;margin:0 auto;padding:90px 24px}
.couple-desktop{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:20px;min-height:520px;position:relative}
.couple-desktop img{width:100%;max-width:380px;border-radius:10px;display:block}
.left-pic{justify-self:start;align-self:start;margin-top:-60px;margin-left:20px;}.right-pic{justify-self:end;align-self:end;margin-bottom:-60px;margin-right:-450px;}
.names{text-align:center;font-size:28px;line-height:1.8;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:420px;z-index:5;display:flex;flex-direction:column;justify-content:center;align-items:center}
.couple-mobile{display:none}
.section{position:relative}.section img{width:100%;height:90vh;object-fit:cover;object-position:center 18%;position:relative}.section:before{content:'';position:absolute;inset:12px;border:1px solid #fff;z-index:2}.date{position:absolute;z-index:3;left:50%;top:50%;transform:translate(-50%,-50%);font-size:34px;color:#fff;letter-spacing:3px}
.location{text-align:center;padding:80px 20px}.location-title{font-size:34px}.location-title span{display:block;margin-left:90px}.map-box{max-width:560px;margin:20px auto;padding:16px;background:#eee;position:relative}.map-box img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}.map-link{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:10px 20px;border:1px solid #333;background:rgba(255,255,255,.85);text-decoration:none;color:#333;border-radius:999px;transition:.25s ease}.map-link:hover{background:#333;color:#fff}.map-text{margin-top:12px}
.gallery{padding:80px 20px}.gallery-row{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gallery-row img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px}
.countdown{text-align:center;padding:60px 20px;font-size:28px}
@media (max-width:768px){
.hero-text{font-size:28px;letter-spacing:2px}
.couple{padding:55px 16px}.couple-desktop{display:none}.couple-mobile{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:6px;min-height:230px}.couple-mobile .left-top{align-self:start;margin-top:-18px}.couple-mobile .right-bottom{align-self:end;margin-bottom:-18px}.side{width:100%;display:flex;align-items:center;gap:8px}.left-top{justify-content:flex-start}.right-bottom{justify-content:flex-end}.side img{width:84px;height:auto;border-radius:8px}.name-vertical{writing-mode:vertical-rl;letter-spacing:2px;font-size:14px;white-space:nowrap}.center-text{width:100%;text-align:center;font-size:13px;line-height:1.5;display:flex;justify-content:center;align-items:center}
.section img{height:28vh}.date{font-size:28px}.location{padding:55px 16px}.location-title{font-size:28px}.location-title span{margin-left:60px}.gallery{padding:50px 12px}.gallery-row{grid-template-columns:1fr}.countdown{font-size:24px;padding:45px 20px}
}
</style>
</head>
<body>
<section class="hero"><div class="hero-text">徐生有李，聚在這裡</div></section>
<section class="couple">
<div class="couple-desktop">
<img src="photo8.jpg" class="left-pic">
<div class="names">徐王麟 &amp; 李亦晴<br><span class="en">We tied the knot.</span></div>
<img src="photo7.jpg" class="right-pic">
</div>
<div class="couple-mobile">
<div class="side left-top"><div class="name-vertical">徐王麟</div><img src="photo8.jpg"></div>
<div class="center-text en">We<br>tied<br>the<br>knot.</div>
<div class="side right-bottom"><img src="photo7.jpg"><div class="name-vertical">李亦晴</div></div>
</div>
</section>
<section class="section"><div class="date en">10.03</div><img src="photo9.jpg"></section>
<section class="location"><div class="location-title en">How to<span>get there</span></div><div class="map-box"><a class="map-link" href="https://maps.app.goo.gl/QE6gDtQd72aYG2VS8" target="_blank">查看 Google 地圖</a><img src="JUN_0172.jpg"><div class="map-text">茹曦酒店<br>捷運</div></div></section>
<section class="gallery"><div class="gallery-row"><img src="photo4.jpg"><img src="photo3.jpg"><img src="photo5.jpg"></div></section>
<section class="countdown en" id="countdown"></section>
<script>
const weddingDate=new Date('2026-10-03T12:30:00');function updateCountdown(){const now=new Date();const diff=weddingDate-now;const days=Math.max(0,Math.floor(diff/(1000*60*60*24)));document.getElementById('countdown').textContent='距離婚禮還有 '+days+' DAYS';}updateCountdown();setInterval(updateCountdown,1000);
</script>
</body>
</html>
